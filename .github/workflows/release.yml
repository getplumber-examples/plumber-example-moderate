name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org
          # No shared cache in the publish job: setup-node's npm cache is keyed
          # only by the lockfile and shared across branches, so a PR could poison
          # the cache a release restores (ISSUE-705). Caching stays in ci.yml.
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
