name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org
          # No shared cache in the publish job: setup-node's npm cache is keyed
          # only by the lockfile and shared across branches, so a PR could poison
          # the cache a release restores (ISSUE-705). Caching stays in ci.yml.
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
