name: Plumber

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: read the repo, write SARIF to code scanning.
# id-token is for publishing the live Plumber Score badge (default branch only).
permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: getplumber/plumber@e3e7a4a54501ea5bed8d015e68ad80539502a22b # v0.4.13
        with:
          # This repo intentionally carries a realistic spread of findings
          # (target grade C). Surface them (SARIF + report) without hard-failing
          # CI on the known gap.
          soft-fail: true
          # Publish the live C badge to score.getplumber.io (default branch only).
          score-push: true
