# =============================================================================
# Plumber policy — SHARED across the three example repositories
# =============================================================================
# This is the SAME file in plumber-example-clean, plumber-example-moderate and
# plumber-example-critical. Only the repository quality differs between them, so
# the three Plumber scores (A / C / E) come purely from the workflows, never
# from a weakened policy.
#
# Every GitHub Actions control that Plumber v0.4.3 ships is ENABLED here and
# tuned to the scope of these repos (a small TypeScript library published to
# npm + a demo container image). This file validates cleanly against v0.4.3:
#
#   plumber config validate
#
# A few controls are API-backed (they call the GitHub API through `gh`) and one
# is opt-in (gitleaks). Without `gh auth login` / gitleaks on PATH they abstain
# instead of producing false positives.
# =============================================================================
version: "2.0"

github:
  controls:

    # ── Supply chain: actions & images ──────────────────────────────────────
    actionsMustBePinnedByCommitSha:
      enabled: true
      trustedOwners:
        - actions
        - github
    actionsMustNotBeArchived:            # API
      enabled: true
    actionsMustNotCarryKnownCVEs:        # API
      enabled: true
    actionRefsMustExistUpstream:         # API (impostor-commit, ISSUE-707)
      enabled: true
    externalRefsMustNotCollide:          # API (ref-confusion, ISSUE-402)
      enabled: true
    githubActionMustComeFromAuthorizedSources:
      enabled: true
      trustGithubOfficialActions: true
      trustSameOrgActions: true
      minimumStars: 0
      trustedGithubActions:
        - getplumber/plumber             # Plumber's own GitHub Action
        - sigstore/cosign-installer      # release signing (clean repo)
    containerImageMustNotUseForbiddenTags:
      enabled: true
      tags:
        - latest
        - dev
        - development
        - staging
        - main
        - master
      containerImagesMustBePinnedByDigest: true
    releaseWorkflowsMustNotRestoreUntrustedCache:   # cache-poisoning, ISSUE-705
      enabled: true
      publishActions:
        - pypa/gh-action-pypi-publish
        - JS-DevTools/npm-publish
        - gradle/publish-plugin
        - softprops/action-gh-release
        - ncipollo/release-action
        - goreleaser/goreleaser-action
        - crazy-max/ghaction-docker-buildx
        - changesets/action
      cacheActions:
        - {action: actions/cache, mode: always}
        - {action: actions/cache/restore, mode: always}
        - {action: Swatinem/rust-cache, mode: always}
        - {action: actions/setup-go, mode: default, disableInput: cache, disableValue: false}
        - {action: gradle/actions/setup-gradle, mode: default, disableInput: cache-disabled, disableValue: true}
        - {action: actions/setup-node, mode: opt-in, enableInput: cache}
        - {action: actions/setup-python, mode: opt-in, enableInput: cache}
        - {action: actions/setup-java, mode: opt-in, enableInput: cache}
        - {action: pnpm/action-setup, mode: opt-in, enableInput: cache}
        - {action: docker/build-push-action, mode: opt-in, enableInput: cache-from, enableContains: type=gha}
      publishScriptPatterns:
        - '(?i)(npm|pnpm|yarn|bun)\s+publish'
        - '(?i)cargo\s+publish'
        - '(?i)twine\s+upload'
        - '(?i)poetry\s+publish'
        - '(?i)gh\s+release\s+create'
        - '(?i)goreleaser\s+release'
        - '(?i)semantic-release'
        - '(?i)gradlew?\b[^\n]*\bpublish'
        - '(?i)\bmvnw?\b[^\n]*\bdeploy\b'
        - '(?i)dotnet\s+nuget\s+push'
        - '(?i)gem\s+push'
        - '(?i)docker\s+push'
      publishScriptExcludePatterns:
        - '(?i)--dry-run'
        - '(?i)publishToMavenLocal'

    # ── Expressions & injection ─────────────────────────────────────────────
    workflowMustNotInjectUserInputInScripts:
      enabled: true
    workflowMustNotWriteUntrustedContentToGitHubEnv:   # env-injection, ISSUE-209
      enabled: true

    # ── Secrets, credentials & permissions ──────────────────────────────────
    pipelineMustNotLeakSecretsInConfig:   # opt-in, requires gitleaks on PATH
      enabled: true
    reusableWorkflowsMustNotInheritSecrets:
      enabled: true
    workflowMustNotExportEntireSecretsContext:   # over-provisioned secrets, ISSUE-309
      enabled: true
    workflowsMustDeclarePermissions:
      enabled: true
    workflowMustNotGrantPermissionsWriteAll:
      enabled: true

    # ── Triggers & composition ──────────────────────────────────────────────
    pipelineMustNotExecuteUnverifiedScripts:
      enabled: true
      trustedUrls: []
    workflowMustNotUseDangerousTriggers:
      enabled: true
    pullRequestTargetMustNotCheckoutHead:
      enabled: true
    pipelineMustNotUseDockerInDocker:
      enabled: true
      detectInsecureDaemon: true
    pipelineMustNotEnableDebugTrace:
      enabled: true
      forbiddenVariables:
        - ACTIONS_STEP_DEBUG
        - ACTIONS_RUNNER_DEBUG
    workflowMustIncludeRequiredActions:
      enabled: true
      # Every repo in this org must run SAST via CodeQL.
      required: github/codeql-action

    # ── Workflow hygiene ────────────────────────────────────────────────────
    securityJobsMustNotBeWeakened:
      enabled: true
      securityJobPatterns:
        - "*codeql*"
        - "*dependency-review*"
        - "*trufflehog*"
        - "*gitleaks*"
        - "*osv-scanner*"
        - "*-sast"
        - "*-sast-*"
        - "*-scan"
        - "*scan*"
        - "*-security"
        - "*-security-*"
        - "*-audit"
        - "*-audit-*"
      allowFailureMustBeFalse:
        enabled: true
      rulesMustNotBeRedefined:
        enabled: true
      whenMustNotBeManual:
        enabled: true

    # ── Repository governance ───────────────────────────────────────────────
    branchMustBeProtected:               # API — needs a token with repo / admin read
      enabled: true
      defaultMustBeProtected: true
      namePatterns:
        - main
        - master
        - "release/*"
      allowForcePush: false
      codeOwnerApprovalRequired: true
